<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Пятница" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Пятница v0.1</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main id="stage" aria-label="Пятница v0.1">
    <section id="face" class="face idle">
      <div class="eyes-wrap" id="eyesWrap">
        <div class="eye left-eye">
          <div class="glow"></div>
          <div class="lid top"></div>
          <div class="lid bottom"></div>
        </div>
        <div class="eye right-eye">
          <div class="glow"></div>
          <div class="lid top"></div>
          <div class="lid bottom"></div>
        </div>
      </div>
      <div id="hint" class="hint hidden">Пятница v0.1</div>
    </section>

    <aside id="menu" class="menu hidden" aria-hidden="true">
      <div class="menu-card">
        <div class="menu-title">Пятница v0.1</div>
        <button data-action="wake">Внимание</button>
        <button data-action="idle">Обычный режим</button>
        <button data-action="quiet">Тихий режим</button>
        <button data-action="sleep">Спать</button>
        <button data-action="tuesday">Вторник preview</button>
        <button data-action="about">О прототипе</button>
        <button data-action="close">Закрыть</button>
      </div>
    </aside>

    <aside id="toast" class="toast hidden"></aside>
  </main>

  <script src="./app.js"></script>
</body>
</html>
